{% assign current_lang = site.active_lang | default: site.default_lang | default: 'de' %}
{% assign contact = site.data[current_lang].strings.home.contact %}
<section id="{{ contact.anchor }}" class="space-y-5 border-t border-gray-200 pt-12 dark:border-zinc-700" aria-labelledby="home-contact-heading">
  <div class="max-w-2xl space-y-3">
    <h2 id="home-contact-heading" class="text-2xl font-semibold tracking-tight text-gray-900 lg:text-3xl dark:text-white">
      {{ contact.title }}
    </h2>
    <p class="text-base leading-relaxed text-gray-700 dark:text-gray-300">
      {{ contact.subtitle }}
    </p>
  </div>
  <a
    href="{{ contact.primary_cta_href }}"
    class="inline-flex items-center justify-center rounded-lg bg-accent-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-accent-700 focus-visible:outline focus-visible:outline-2 focus-visible:outline-accent-200 dark:hover:bg-accent-500"
  >
    {{ contact.primary_cta_label }}
  </a>
</section>
