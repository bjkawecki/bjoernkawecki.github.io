{% assign current_lang = site.active_lang | default: site.default_lang | default: 'de' %}
{% assign diagram = site.data[current_lang].strings.softwareentwicklung.diagram %}
<figure class="software-diagram" aria-label="{{ diagram.aria_label }}">
  <div class="software-diagram__canvas" role="group" aria-label="{{ diagram.aria_label }}">
    <svg
      class="software-diagram__svg text-accent-600 dark:text-accent-400"
      viewBox="0 0 100 100"
      preserveAspectRatio="xMidYMid meet"
      fill="none"
      aria-hidden="true"
    >
      {%- comment -%} Orbit-Band zwischen Prozess und Dimensionen {%- endcomment -%}
      <circle cx="50" cy="50" r="34" stroke="currentColor" stroke-width="20" opacity="0.04" />

      {%- comment -%} Radar-Strahlen (alle 30°) {%- endcomment -%}
      <g stroke="currentColor" stroke-width="0.55" opacity="0.16">
        <line x1="50" y1="27.5" x2="50" y2="3" />
        <line x1="61.25" y1="30.51" x2="73.5" y2="9.43" />
        <line x1="69.49" y1="38.75" x2="90.57" y2="26.5" />
        <line x1="72.5" y1="50" x2="97" y2="50" />
        <line x1="69.49" y1="61.25" x2="90.57" y2="73.5" />
        <line x1="61.25" y1="69.49" x2="73.5" y2="90.57" />
        <line x1="50" y1="72.5" x2="50" y2="97" />
        <line x1="38.75" y1="69.49" x2="26.5" y2="90.57" />
        <line x1="30.51" y1="61.25" x2="9.43" y2="73.5" />
        <line x1="27.5" y1="50" x2="3" y2="50" />
        <line x1="30.51" y1="38.75" x2="9.43" y2="26.5" />
        <line x1="38.75" y1="30.51" x2="26.5" y2="9.43" />
      </g>

      <circle cx="50" cy="50" r="34" stroke="currentColor" stroke-width="0.5" opacity="0.12" />
      <circle cx="50" cy="50" r="46" stroke="currentColor" stroke-width="0.5" opacity="0.10" stroke-dasharray="1.2 1.8" />

      <circle cx="50" cy="50" r="22" stroke="currentColor" stroke-width="1.5" />
      <g fill="currentColor">
        <path transform="translate(65.56 34.44) rotate(45)" d="M-1.2 -2.4 L4 0 L-1.2 2.4 Z" />
        <path transform="translate(65.56 65.56) rotate(135)" d="M-1.2 -2.4 L4 0 L-1.2 2.4 Z" />
        <path transform="translate(34.44 65.56) rotate(225)" d="M-1.2 -2.4 L4 0 L-1.2 2.4 Z" />
        <path transform="translate(34.44 34.44) rotate(315)" d="M-1.2 -2.4 L4 0 L-1.2 2.4 Z" />
      </g>
    </svg>

    <div class="software-diagram__center">
      <span class="software-diagram__center-text">
        {% for line in diagram.center %}
        <span class="software-diagram__center-line">{{ line }}</span>
        {% endfor %}
      </span>
    </div>

    {% for step in diagram.process %}
    {% if forloop.index0 == 0 %}
    <div class="software-diagram__label software-diagram__process--0">
    {% elsif forloop.index0 == 1 %}
    <div class="software-diagram__label software-diagram__process--1">
    {% elsif forloop.index0 == 2 %}
    <div class="software-diagram__label software-diagram__process--2">
    {% else %}
    <div class="software-diagram__label software-diagram__process--3">
    {% endif %}
      <span class="software-diagram__chip">{{ step }}</span>
    </div>
    {% endfor %}

    {% for dim in diagram.dimensions %}
    {% assign tip_id = "software-dim-tip-" | append: current_lang | append: "-" | append: forloop.index0 %}
    {% if forloop.index0 == 0 %}
    <div class="software-diagram__label software-diagram__label--tip software-diagram__dimension--0">
    {% elsif forloop.index0 == 1 %}
    <div class="software-diagram__label software-diagram__label--tip software-diagram__dimension--1">
    {% elsif forloop.index0 == 2 %}
    <div class="software-diagram__label software-diagram__label--tip software-diagram__dimension--2">
    {% elsif forloop.index0 == 3 %}
    <div class="software-diagram__label software-diagram__label--tip software-diagram__dimension--3">
    {% elsif forloop.index0 == 4 %}
    <div class="software-diagram__label software-diagram__label--tip software-diagram__dimension--4">
    {% else %}
    <div class="software-diagram__label software-diagram__label--tip software-diagram__dimension--5">
    {% endif %}
      <button
        type="button"
        class="software-diagram__chip software-diagram__chip--plain software-diagram__trigger"
        aria-describedby="{{ tip_id }}"
        aria-expanded="false"
      >
        {{ dim.label }}
      </button>
      <span
        id="{{ tip_id }}"
        role="tooltip"
        class="software-diagram__tooltip{% if forloop.index0 == 0 %} software-diagram__tooltip--below{% endif %}"
      >
        {{ dim.question }}
      </span>
    </div>
    {% endfor %}
  </div>

  {% if diagram.legend %}
  <figcaption class="mt-3 text-center text-sm text-gray-600 dark:text-gray-400">
    {{ diagram.legend }}
  </figcaption>
  {% endif %}
</figure>
