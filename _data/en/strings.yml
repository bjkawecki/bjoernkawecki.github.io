home:
  geschichte:
    title: "About"
    anchor: "about"
    paragraphs:
      - "Hello, my name is Björn. I live in Berlin and have been working as an application developer since 2025."
      - "After graduating in Russian studies I began my career as an editor in 2021. Media work was not a lasting fit; in 2024 I moved into tech."
      - "I had already started programming during my studies. In 2020 I began a web app for learning Russian; it became a long-term project that continues today as [Filingo](/projects/filingo/)."
      - "In parallel I work on questions of knowledge management. With [DocsOps](/projects/docs-ops/) I am building an open-source platform for internal organisational knowledge. On [Knowledge Management](/knowledge-management/) I explain why knowledge in organisations is often lost or hard to use, and I offer support."
      - "For implementing my projects I now rely heavily on AI. Because the product always mattered more to me than the code, working with AI suited me well. I write more about my approach on the [Software Development](/software-development/) page."
