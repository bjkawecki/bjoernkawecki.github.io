softwareentwicklung:
  title: "Software Development"
  intro:
    - "As capable AI tools see wider use, the focus in software development is shifting. Pure implementation, meaning writing and generating code, becomes more efficient. That creates capacity for other parts of development: understanding requirements, making decisions, documenting relationships, and evolving systems."
    - "Software development is therefore more closely tied to product development today: what gets built, for whom, and with what effects on operations, maintainability, and future development?"
  before_diagram: []
  diagram:
    aria_label: "Software product at the center, development process inside, product dimensions outside with example questions"
    center:
      - "Software"
      - "product"
    legend: "Inner: development process · Outer: product dimensions"
    process:
      - "Requirement"
      - "Decision"
      - "Implementation"
      - "Documentation"
    dimensions:
      - label: "UI / UX"
        question: "How are users guided through the application? How are complex flows made understandable?"
      - label: "Backend"
        question: "Which parts should be custom-built? Which tasks can frameworks or existing components take on?"
      - label: "Data"
        question: "Which relationships need to be represented? How can the data model change as requirements grow?"
      - label: "Interfaces"
        question: "Which areas should external platforms or services own? What dependencies does that create?"
      - label: "Operations"
        question: "How is it monitored whether a system is working? How are failures detected and investigated?"
      - label: "Architecture"
        question: "How is the system divided into maintainable parts? How do interfaces between those parts stay stable?"
  after_diagram:
    - "The development process connects requirement, decision, implementation, and documentation. Alongside the code, assumptions, decisions, and hard-won experience emerge. Documentation records those relationships and keeps them available for later changes."
    - "Good decisions depend on understanding the different dimensions of software. The better those dimensions are understood, the more precisely requirements can be framed and the right questions asked."
  closing:
    paragraphs:
      - "I see this as a positive development: Growing automation of implementation creates room for software development in which understanding the product and its dimensions moves more firmly into the center. The capacity that becomes available opens the possibility of strengthening requirements, decisions, implementation, and documentation as equal parts."
docs_engineering:
  hero:
    headline: "Make your organisation’s knowledge usable"
    lead: "I help organisations and IT teams turn their knowledge about systems, projects, and workflows into structures that hold up in daily work: findable, current, and independent of individual people."
  problem:
    heading: "Inaccessible knowledge is a risk"
    paragraphs:
      - "“How do we do this again?” “Is there documentation for this?” “Is the guide still up to date?” Questions like these come up when experience and context exist only in people’s heads."
      - "When an experienced colleague leaves the team, the knowledge about workflows, decisions, and edge cases leaves with him. And new colleagues spend weeks piecing together what could have been documented."
      - "That costs time and creates dependencies: follow-up questions interrupt work, outdated instructions lead people astray, and the same knowledge is worked out again and again or drifts apart."
      - "Organisations invest a lot in software, infrastructure, and processes. The knowledge about them grows every day, but is rarely maintained with the same care."
    chaos_alt: "Scattered documents and folders"
  solution:
    heading: "From scattered knowledge to clear structures"
    paragraphs:
      - "For knowledge to stay usable, it takes more than individual documents: clear structures, defined responsibilities, and regular maintenance. This systematic approach is called Documentation Engineering: documentation is treated like a system that grows with the organisation."
      - "That is exactly where I support you: I analyse what knowledge exists and where the gaps are, organise existing content, and build clear structures, for software and infrastructure as well as for workflows, responsibilities, and internal processes."
      - "The result is a knowledge base your team actually works with: a repository with a clear logic, documented workflows, and standards that assign new content to the right place on their own."
    order_alt: "Structured documentation hierarchy"
  approach:
    heading: "How we work together"
    paragraphs:
      - "Collaboration starts with a concrete problem or area, for example a system without documentation or onboarding that takes too long. In an initial conversation we clarify the starting point and goal; after that come the analysis of existing structures, the planning of scope and priorities, and step-by-step delivery."
      - "Often the outside perspective helps: it shows what is missing, what is duplicated, and where structures are unclear, blind spots that go unnoticed in daily work. Good collaboration needs little from your side, but it matters: a clearly defined scope, a fixed contact person for questions, access to the relevant information, and subject-matter input when context is needed."
      - "I work in the systems you already use. New tools only become part of the solution when they bring clear value. I use AI deliberately to draft and structure content; context, decisions, and responsibility stay with people."
  closing:
    text: "Want to know where your organisation stands on documentation and knowledge management? In a no-obligation conversation you will get an initial assessment and concrete next steps."
    cta_label: "Request a conversation"
