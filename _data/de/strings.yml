home:
  geschichte:
    title: "Über mich"
    anchor: "ueber-mich"
    paragraphs:
      - "Hallo, ich heiße Björn, lebe in Berlin und arbeite seit 2025 als Anwendungsentwickler."
      - "Beruflich begann ich nach dem Russistik-Studium 2021 als Redakteur. Die Medienarbeit passte auf Dauer nicht; 2024 wechselte ich in den Tech-Bereich."
      - "Mit dem Programmieren hatte ich schon im Studium angefangen. 2020 startete ich eine Web-App zum Russischlernen, daraus wurde ein Langzeitprojekt, das heute als [Filingo](/projects/filingo/) weiterläuft."
      - "Parallel beschäftige ich mich mit Fragen des Wissensmanagements. Mit [DocsOps](/projects/docs-ops/) baue ich eine Open-Source-Plattform für internes Organisationswissen. Unter [Wissensmanagement](/knowledge-management/) erkläre ich, warum Wissen in Organisationen oft verloren geht oder schwer nutzbar bleibt, und biete Unterstützung an."
      - "Für die Umsetzung meiner Projekte setze ich mittlerweile stark auf KI. Da für mich stets mehr das Produkt als der Code im Mittelpunkt stand, kam mir das Arbeiten mit KI gelegen. Mehr über meinen Ansatz schreibe ich auf der Seite [Softwareentwicklung](/software-development/)."
    resume_label: "Lebenslauf (PDF)"
    resume_href: "/assets/files/bjoern-kawecki-resume.pdf"
    certificate_label: "Zertifikat: AWS Cloud Practitioner"
