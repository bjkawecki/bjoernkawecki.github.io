softwareentwicklung:
  title: "Softwareentwicklung"
  intro:
    - "Mit dem zunehmenden Einsatz leistungsfähiger KI-Werkzeuge verschiebt sich der Schwerpunkt in der Softwareentwicklung. Die reine Umsetzung, also das Schreiben und Erzeugen von Code, wird effizienter. Dadurch entstehen Kapazitäten für andere Bestandteile der Entwicklung: Anforderungen verstehen, Entscheidungen treffen, Zusammenhänge dokumentieren und Systeme weiterentwickeln."
    - "Softwareentwicklung ist daher heute enger mit Produktentwicklung verbunden: Was wird gebaut, für wen und mit welchen Auswirkungen auf Betrieb, Wartbarkeit und Weiterentwicklung?"
  before_diagram: []
  diagram:
    aria_label: "Softwareprodukt im Zentrum, Entwicklungsprozess innen, Produktdimensionen außen mit Beispielfragen"
    center:
      - "Software"
      - "Produkt"
    legend: "Innen: Entwicklungsprozess · Außen: Produktdimensionen"
    process:
      - "Anforderung"
      - "Entscheidung"
      - "Umsetzung"
      - "Dokumentation"
    dimensions:
      - label: "UI / UX"
        question: "Wie werden Nutzer durch die Anwendung geführt? Wie werden komplexe Abläufe verständlich dargestellt?"
      - label: "Backend"
        question: "Welche Teile sollten individuell entwickelt werden? Welche Aufgaben können Frameworks oder bestehende Komponenten übernehmen?"
      - label: "Daten"
        question: "Welche Beziehungen müssen abgebildet werden? Wie lässt sich das Datenmodell ändern, wenn die Anforderungen wachsen?"
      - label: "Schnittstellen"
        question: "Welche Bereiche sollten externe Plattformen oder Dienste übernehmen? Welche Abhängigkeiten entstehen dadurch?"
      - label: "Betrieb"
        question: "Wie wird überwacht, ob ein System funktioniert? Wie werden Fehler erkannt und untersucht?"
      - label: "Architektur"
        question: "Wie wird das System in wartbare Bestandteile gegliedert? Wie bleiben Schnittstellen zwischen diesen Teilen stabil?"
  after_diagram:
    - "Der Entwicklungsprozess verbindet Anforderung, Entscheidung, Umsetzung und Dokumentation. Neben dem Code entstehen dabei Annahmen, Entscheidungen und Erfahrungswerte. Dokumentation hält diese Zusammenhänge fest und macht sie für spätere Änderungen verfügbar."
    - "Gute Entscheidungen setzen ein Verständnis der verschiedenen Dimensionen von Software voraus. Je besser diese Dimensionen verstanden werden, desto präziser können Anforderungen formuliert und die richtigen Fragen gestellt werden."
  closing:
    paragraphs:
      - "Ich sehe das als positive Entwicklung: Die zunehmende Automatisierung der Umsetzung schafft Raum für eine Softwareentwicklung, in der das Verständnis des Produkts und seiner Dimensionen stärker in den Mittelpunkt rückt. Die frei werdenden Kapazitäten eröffnen die Möglichkeit, Anforderungen, Entscheidungen, Umsetzung und Dokumentation als gleichwertige Bestandteile zu stärken."
docs_engineering:
  hero:
    headline: "Machen Sie das Wissen Ihrer Organisation nutzbar"
    lead: "Ich unterstütze Organisationen und IT-Teams dabei, ihr Wissen über Systeme, Projekte und Abläufe in Strukturen zu überführen, die im Alltag tragen: auffindbar, aktuell und unabhängig von einzelnen Köpfen."
  problem:
    heading: "Unzugängliches Wissen ist ein Risiko"
    paragraphs:
      - "„Wie machen wir das hier nochmal?“ „Gibt es dazu eine Dokumentation?“ „Ist die Anleitung noch aktuell?“ Solche Fragen tauchen auf, wenn Erfahrung und Kontext nur in Köpfen existieren."
      - "Verlässt ein erfahrener Kollege das Team, fehlt mit ihm das Wissen über Abläufe, Entscheidungen und Sonderfälle. Und neue Mitarbeiter suchen sich über Wochen zusammen, was dokumentiert sein könnte."
      - "Das kostet Zeit und erzeugt Abhängigkeiten: Rückfragen unterbrechen die Arbeit, veraltete Anleitungen führen in die Irre, dasselbe Wissen wird mehrfach neu erarbeitet oder driftet auseinander."
      - "Organisationen investieren viel in Software, Infrastruktur und Prozesse. Das Wissen darüber entsteht täglich mit, wird aber selten genauso gepflegt."
    chaos_alt: "Ungeordnete Dokumente und Ordner"
  solution:
    heading: "Von verstreutem Wissen zu klaren Strukturen"
    paragraphs:
      - "Damit Wissen nutzbar bleibt, braucht es mehr als einzelne Dokumente: klare Strukturen, definierte Verantwortlichkeiten und regelmäßige Pflege. Diesen systematischen Ansatz nennt man Documentation Engineering: Dokumentation wird wie ein System behandelt, das mit der Organisation mitwächst."
      - "Genau dabei unterstütze ich Sie: Ich analysiere, welches Wissen vorhanden ist und wo Lücken liegen, ordne bestehende Inhalte und baue nachvollziehbare Strukturen auf, für Software und Infrastruktur ebenso wie für Arbeitsabläufe, Verantwortlichkeiten und interne Prozesse."
      - "Das Ergebnis ist eine Wissensbasis, mit der Ihr Team tatsächlich arbeitet: eine Ablage mit klarer Logik, dokumentierte Abläufe und Standards, die neuen Inhalten von selbst den richtigen Ort zuweisen."
    order_alt: "Strukturierte Dokumentationshierarchie"
  approach:
    heading: "Wie wir zusammenarbeiten"
    paragraphs:
      - "Eine Zusammenarbeit beginnt mit einem konkreten Problem oder Bereich, etwa einem System ohne Dokumentation oder einem Onboarding, das zu lange dauert. In einem Erstgespräch klären wir Ausgangslage und Ziel; danach folgen die Analyse bestehender Strukturen, die Planung von Umfang und Prioritäten und die schrittweise Umsetzung."
      - "Oft hilft dabei der Blick von außen: Er zeigt, was fehlt, was doppelt ist und wo Strukturen unklar sind, blinde Flecken, die im Alltag nicht mehr auffallen. Auf Ihrer Seite braucht es wenig, aber Entscheidendes: einen klar umrissenen Bereich, eine feste Ansprechperson für Rückfragen, Zugang zu den relevanten Informationen und fachliche Mitwirkung, wenn Einordnung gefragt ist."
      - "Dabei arbeite ich in den Systemen, die Sie bereits nutzen. Neue Werkzeuge sind nur dann Teil der Lösung, wenn sie klaren Mehrwert bringen. KI setze ich gezielt ein, um Inhalte zu erstellen und zu strukturieren; Kontext, Entscheidungen und Verantwortung bleiben dabei beim Menschen."
  closing:
    text: "Sie möchten wissen, wo Ihre Organisation beim Thema Dokumentation und Wissensmanagement steht? In einem unverbindlichen Gespräch erhalten Sie eine erste Einschätzung und konkrete nächste Schritte."
    cta_label: "Gespräch anfragen"
