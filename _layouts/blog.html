<!DOCTYPE html>
{% assign current_lang = site.active_lang | default: site.default_lang | default: 'de' %}
<html lang="{{ current_lang }}">
  <head>
    <meta property="og:type" content="website" />
    <meta property="og:title" content="{{ page.title | escape }}" />
    <meta
      property="og:description"
      content="{{ page.description | default: site.description | escape }}"
    />
    <meta property="og:url" content="{{ site.url }}{{ page.url }}" />
    {% include head.html %}
  </head>

  <body class="text-gray-700 bg-brand-50 dark:bg-brand-950 dark:text-gray-100 transition-colors">
    {% include site-header.html %}
    <main
      id="main-content"
      class="mx-auto max-w-5xl space-y-12 px-5 pb-16 pt-8 md:px-8 md:pb-20 md:pt-10"
      aria-label="Content"
    >
      <div class="space-y-12">
        {{ content }}
      </div>
      {% if paginator and paginator.posts.size > 0 %}
        {% include pagination.html %}
      {% endif %}
    </main>
    {% include footer.html %}
  </body>
</html>
