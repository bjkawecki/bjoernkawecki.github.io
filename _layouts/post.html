---
layout: default
---
<article class="mx-auto max-w-3xl px-4 py-12 sm:px-6">
  <header class="mb-8">
    <h1 class="text-3xl font-semibold tracking-tight text-slate-900 sm:text-4xl">{{ page.title }}</h1>
    <time datetime="{{ page.date | date_to_xmlschema }}" class="mt-2 block text-sm text-slate-500">{{ page.date | date: "%d.%m.%Y" }}</time>
  </header>
  <div class="prose prose-slate max-w-none text-slate-700">
    {{ content }}
  </div>
  <p class="mt-10">
    <a href="{{ site.baseurl }}{% if site.active_lang != site.default_lang %}{{ site.active_lang }}/{% endif %}blog/" class="text-emerald-600 hover:text-emerald-700 font-medium">← Zurück zum Blog</a>
  </p>
</article>
