<!DOCTYPE html>
{% assign current_lang = site.active_lang | default: site.default_lang | default: 'de' %}
<html lang="{{ current_lang }}">
  <head>
    {% include head.html %}
    <meta property="og:title" content="{{ page.title | escape }}" />
    <meta
      property="og:description"
      content="{{ page.description | default: site.title | escape }}"
    />
    <meta property="og:url" content="{{ site.url }}{{ page.url }}" />
    <link rel="canonical" href="{{ site.url }}{{ page.url }}" />
  </head>
  <body class="text-gray-700 bg-brand-50 dark:bg-brand-950 dark:text-gray-100 transition-colors">
    {% include site-header.html %}
    <main
      id="main-content"
      class="mx-auto max-w-3xl space-y-8 px-5 pb-16 pt-8 md:px-8 md:pb-20 md:pt-10"
      aria-label="Content"
    >
      <article
        class="prose prose-lg dark:prose-invert prose-a:text-brand-600 dark:prose-a:text-accent-400 prose-a:font-semibold prose-a:transition prose-headings:text-gray-900 dark:prose-headings:text-gray-100 prose-links-hover"
      >
        <h1 class="text-3xl font-medium tracking-tight text-gray-900 dark:text-gray-100">
          {{ page.title }}
        </h1>
        {{ content }}
      </article>
    </main>
    {% include footer.html %}
  </body>
</html>
